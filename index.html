<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Financiero - Familia Bautista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.4);
            transition: opacity 0.3s ease;
        }
        .transition-no-blur {
            backdrop-filter: none !important;
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-6">

    <!-- Botones principales -->
    <div class="fixed bottom-10 right-10 flex flex-col gap-4">
        <button onclick="openModal('modalParametrizar')" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-full shadow-lg transition">Parametrizar contrato</button>
        <button onclick="openModal('modalPerfil')" class="bg-green-600 hover:bg-green-500 text-white p-4 rounded-full shadow-lg transition">Crear perfil</button>
    </div>

    <!-- Modal Parametrizar -->
    <div id="modalParametrizar" class="fixed inset-0 flex items-center justify-center modal-overlay hidden z-50">
        <div class="liquid-glass p-8 rounded-3xl w-full max-w-2xl text-white shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">Parametrizar Contrato</h2>
            
            <div class="space-y-4">
                <!-- Selector Arrendatario -->
                <div class="relative">
                    <label class="block text-sm opacity-70 mb-1">Arrendatario / Inquilino</label>
                    <div id="selectorPerfil" onclick="toggleDropdown()" class="w-full bg-black/30 p-3 rounded-xl border border-white/10 cursor-pointer">
                        Seleccionar perfil existente...
                    </div>
                    <!-- Desplegable -->
                    <div id="dropdownPerfil" class="hidden absolute w-full mt-2 bg-slate-900 border border-white/10 rounded-xl p-2 z-10">
                        <p class="text-center opacity-50 py-2">No se encontraron perfiles activos para parametrizar.</p>
                        <button onclick="switchToCrearPerfil()" class="w-full text-left text-white/70 hover:text-green-400 opacity-100 transition duration-200 p-2 flex justify-between items-center hover:bg-white/5 rounded-lg">
                            <span>Agregar nuevo perfil</span>
                            <span class="text-xl">+</span>
                        </button>
                    </div>
                </div>
            </div>
            <button onclick="closeModal('modalParametrizar')" class="mt-8 bg-white/10 w-full py-3 rounded-xl hover:bg-white/20">Cerrar</button>
        </div>
    </div>

    <!-- Modal Crear Perfil -->
    <div id="modalPerfil" class="fixed inset-0 flex items-center justify-center modal-overlay hidden z-50">
        <div class="liquid-glass p-8 rounded-3xl w-full max-w-lg">
            <h2 class="text-2xl font-bold mb-6">Crear Nuevo Perfil</h2>
            <button onclick="closeModal('modalPerfil')" class="mt-4 bg-red-500/20 w-full py-3 rounded-xl">Cerrar</button>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function toggleDropdown() {
            document.getElementById('dropdownPerfil').classList.toggle('hidden');
        }

        function switchToCrearPerfil() {
            // Cierra el primero sin blur adicional
            const m1 = document.getElementById('modalParametrizar');
            m1.classList.add('transition-no-blur');
            m1.classList.add('hidden');
            
            // Abre el segundo
            openModal('modalPerfil');
        }
    </script>
</body>
</html>
